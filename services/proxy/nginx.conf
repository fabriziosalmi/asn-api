user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log method + path only ($uri), never $request — the WebSocket handshake
    # carries the API key in the query string and $request would leak it.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request_method $uri" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 1m;

    server {
        listen 80;
        server_name localhost;

        # Resolve upstream hostnames at request time via Docker's embedded DNS.
        # Combined with variables in proxy_pass below, this means a backend
        # container that is recreated with a new IP is picked up automatically
        # (within `valid=`) — no proxy restart needed, no stale-IP 502s.
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Backends as variables (not `upstream` blocks) so nginx re-resolves them.
        set $api_backend     asn-api:8000;
        set $grafana_backend dashboard:3000;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Prometheus metrics are internal telemetry — never expose them to the
        # public internet. Exact-match location wins over the /api/ prefix.
        location = /api/metrics {
            return 403;
        }

        # API Proxy (HTTP) — strip the /api prefix before proxying.
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket streaming endpoint — requires upgrade headers
        location /api/v1/stream {
            proxy_pass http://$api_backend/v1/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Grafana Proxy
        location /dashboard/ {
            rewrite ^/dashboard/(.*)$ /$1 break;
            proxy_pass http://$grafana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Health check - verifies upstream API is responding
        location /health {
            proxy_pass http://$api_backend/health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }
    }
}
