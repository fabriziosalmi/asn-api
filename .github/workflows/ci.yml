name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linters
      run: pip install ruff black

    - name: Lint with ruff
      run: ruff check .

    - name: Check formatting with black
      run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: |
          services/api/requirements.txt
          services/engine/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/api/requirements.txt
        pip install -r services/engine/requirements.txt
        pip install pytest pytest-asyncio anyio httpx starlette

    - name: Run tests
      env:
        API_SECRET_KEY: test-secret-key-padding-to-32bytes!!
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_pass
        LOG_FORMAT: text
      run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Provide a .env for interpolation
      run: cp .env.example .env

    - name: Validate docker-compose config
      run: docker compose config -q

    - name: Validate nginx config (open-source nginx)
      run: |
        # Neutralise upstreams (unresolvable in CI) so `nginx -t` reaches every
        # directive — this is exactly what caught the NGINX-Plus-only directive.
        sed -e 's/asn-api:8000/127.0.0.1:8000/' -e 's/dashboard:3000/127.0.0.1:3000/' \
          services/proxy/nginx.conf > /tmp/nginx.test.conf
        docker run --rm --entrypoint nginx \
          -v /tmp/nginx.test.conf:/etc/nginx/nginx.conf:ro \
          nginx:stable-alpine -t

    - name: Build all service images
      run: docker compose build

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Audit dependencies
      run: |
        pip install pip-audit
        # starlette 0.52.1 is pulled transitively by fastapi (<1.0, which caps
        # starlette <0.53). The advisories below are only fixed in starlette
        # >=1.0 — a line NO released FastAPI supports yet, so there is currently
        # no installable fix. They are suppressed with justification and MUST be
        # re-evaluated on every FastAPI bump (drop these flags once FastAPI
        # supports starlette 1.x). Exposure here is low: the app uses its own
        # API-key auth (not starlette AuthenticationMiddleware) and no multipart
        # / UploadFile endpoints.
        STARLETTE_UNFIXABLE="--ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-248 --ignore-vuln PYSEC-2026-249 --ignore-vuln CVE-2026-48817 --ignore-vuln CVE-2026-48818"
        pip-audit -r services/api/requirements.txt $STARLETTE_UNFIXABLE
        pip-audit -r services/engine/requirements.txt
        pip-audit -r services/ingestor/requirements.txt

  load-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validate locustfile syntax
      run: |
        pip install locust
        python -c "import tests.load.locustfile"
