name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linters
      run: pip install ruff black

    - name: Lint with ruff
      run: ruff check .

    - name: Check formatting with black
      run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/api/requirements.txt
        pip install -r services/engine/requirements.txt
        pip install pytest httpx starlette

    - name: Run tests with Mocks
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/services
        pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Audit dependencies
      run: |
        pip install pip-audit
        pip-audit -r services/api/requirements.txt
        pip-audit -r services/engine/requirements.txt
        pip-audit -r services/ingestor/requirements.txt
