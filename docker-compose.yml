services:
  # ------------------------------------------------------------------
  # 1. DATA STORAGE LAYER
  # ------------------------------------------------------------------

  db-metadata:
    image: postgres:15-alpine
    container_name: asn_db_meta
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db-metadata/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asn_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  db-timeseries:
    image: clickhouse/clickhouse-server:latest
    container_name: asn_db_history
    restart: always
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./services/db-timeseries/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asn_backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  broker-cache:
    image: redis:7-alpine
    container_name: asn_broker
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - asn_backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # 2. PROCESSING LAYER (WORKERS)
  # ------------------------------------------------------------------

  asn-ingestor:
    build:
      context: ./services/ingestor
    container_name: asn_worker_ingest
    restart: unless-stopped
    depends_on:
      broker-cache:
        condition: service_healthy
      db-timeseries:
        condition: service_healthy
    environment:
      - BROKER_URL=redis://broker-cache:6379/0
      - DB_TS_HOST=db-timeseries
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - PYTHONUNBUFFERED=1
      - RIPE_RIS_ENABLED=true
      - LOG_FORMAT=${LOG_FORMAT:-json}
    networks:
      - asn_backend
      - asn_public
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  asn-engine:
    build:
      context: ./services/engine
    container_name: asn_worker_scoring
    restart: unless-stopped
    depends_on:
      db-metadata:
        condition: service_healthy
      db-timeseries:
        condition: service_healthy
      broker-cache:
        condition: service_healthy
    environment:
      - DB_META_HOST=db-metadata
      - DB_TS_HOST=db-timeseries
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - BROKER_URL=redis://broker-cache:6379/0
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    networks:
      - asn_backend
      - asn_public
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ------------------------------------------------------------------
  # 3. INTERFACE LAYER (API & DASHBOARD)
  # ------------------------------------------------------------------

  asn-api:
    build:
      context: ./services/api
    container_name: asn_api_gateway
    restart: always
    depends_on:
      db-metadata:
        condition: service_healthy
      db-timeseries:
        condition: service_healthy
      broker-cache:
        condition: service_healthy
    environment:
      - DB_META_HOST=db-metadata
      - DB_TS_HOST=db-timeseries
      - REDIS_HOST=broker-cache
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - CACHE_TTL=${CACHE_TTL:-60}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-100}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - asn_backend
      - asn_public
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  dashboard:
    image: grafana/grafana:latest
    container_name: asn_viz
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/dashboard/provisioning:/etc/grafana/provisioning
      - ./services/dashboard/dashboards:/etc/grafana/provisioning/dashboards/json
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - asn_backend
      - asn_public
    depends_on:
      db-timeseries:
        condition: service_healthy
      db-metadata:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  proxy:
    image: nginx:stable-alpine
    container_name: asn_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./services/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - asn-api
      - dashboard
    networks:
      - asn_backend
      - asn_public
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ------------------------------------------------------------------
# NETWORKS & VOLUMES
# ------------------------------------------------------------------
networks:
  asn_backend:
    internal: true
  asn_public:

volumes:
  postgres_data:
  clickhouse_data:
  grafana_data:
