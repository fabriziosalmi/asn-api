[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
/(
  \.venv
  | venv
  | migrations
  | docs
)/
'''

[tool.ruff]
# Keep ruff's built-in default rule set (E4/E7/E9 + F). The value of this config
# is centralizing line length + excluding venv/migrations/docs so that the CI's
# `ruff check .` / `black --check .` scan exactly the source we own.
line-length = 88
target-version = "py311"
extend-exclude = ["venv", ".venv", "migrations", "docs"]
