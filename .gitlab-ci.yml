stages:
  - lint
  - test
  - security
  - build

variables:
  DOCKER_DRIVER: overlay2

services:
  - postgres:15-alpine
  - redis:7-alpine

linting:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff black
    - ruff check .
    - black --check .

unit_tests:
  stage: test
  image: python:3.11
  variables:
    POSTGRES_DB: $POSTGRES_DB
    POSTGRES_USER: $POSTGRES_USER
    POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    DB_META_HOST: postgres
    REDIS_HOST: redis
    API_SECRET_KEY: $API_SECRET_KEY
    LOG_FORMAT: text
  before_script:
    - pip install -r services/api/requirements.txt
    - pip install pytest pytest-asyncio httpx
  script:
    - pytest tests/ -v

dep_audit:
  stage: security
  image: python:3.11-slim
  script:
    - pip install pip-audit
    - pip-audit -r services/api/requirements.txt
    - pip-audit -r services/engine/requirements.txt
    - pip-audit -r services/ingestor/requirements.txt
  allow_failure: true

build_api:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA ./services/api
    - docker push $CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA
  only:
    - main
    - tags
